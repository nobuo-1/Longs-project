services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - claude_data:/claude
    ports:
      - "3000:3000"
    command: pnpm dev
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/apparel_db
      - CLAUDE_CONFIG_DIR=/claude
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: apparel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  app_node_modules:
  claude_data: